<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Tansu - Beta</title>
    <!-- 1. LOAD THE ENGINES (CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 2. THE BRIDGE (Replaces the "import" lines)
        const { useState, useEffect, useCallback } = React;
        const { Plus, X, Trash2, Layers, Grid3x3, Check, ImageOff } = lucide;

        // 3. CORE DATA (From your source)
        const CATEGORIES = [
            { id: "kimono", label: "Kimono", jp: "着物" },
            { id: "obi", label: "Obi", jp: "帯" },
            { id: "obiage", label: "Obiage", jp: "帯揚げ" },
            { id: "obijime", label: "Obijime", jp: "帯締め" },
            { id: "haneri", label: "Han-eri", jp: "半襟" },
            { id: "accessories", label: "Accessories", jp: "小物" },
        ];

        const SEASONS = [
            { id: "awase", label: "Awase", jp: "袷" },
            { id: "hitoe", label: "Hitoe", jp: "単衣" },
            { id: "usumono", label: "Usumono", jp: "薄物" },
            { id: "yukata", label: "yukata", jp: "浴衣" },
        ];

        const uid = () => Math.random().toString(36).slice(2, 10);
        const emptyForm = { category: "kimono", name: "", season: "awase", color: "#4a5a7a", imageUrl: "", notes: "" };

        // 4. MAIN APP LOGIC (Note: No "export default" here)
        function KimonoCloset() {
            const [ready, setReady] = useState(false);
            const [items, setItems] = useState([]);
            const [tab, setTab] = useState("closet");
            const [filter, setFilter] = useState("all");
            const [showForm, setShowForm] = useState(false);
            const [form, setForm] = useState(emptyForm);

            useEffect(() => { setReady(true); }, []);

            if (!ready) return <div style={styles.loadingWrap}>Preparing closet...</div>;

            return (
                <div style={styles.app}>
                    <FontLoader />
                    <header style={styles.header}>
                        <div style={styles.headerMark}>衣</div>
                        <div style={styles.headerTitle}>Kimono Closet</div>
                    </header>
                    <nav style={styles.tabBar}>
                        <button onClick={() => setTab("closet")} style={styles.tabButton}><Grid3x3 size={16} /> Closet</button>
                    </nav>
                    <main style={styles.main}>
                        <div style={styles.chipRow}>
                            <button onClick={() => setFilter("all")} style={styles.chip}>All</button>
                            {CATEGORIES.map(c => <button key={c.id} onClick={() => setFilter(c.id)} style={styles.chip}>{c.label}</button>)}
                        </div>
                        <div style={styles.grid}>
                            {items.filter(i => filter === "all" || i.category === filter).map(item => (
                                <div key={item.id} style={styles.card}>
                                    <div style={{...styles.cardSwatch, background: item.color}} />
                                    <div style={styles.cardBody}>{item.name}</div>
                                </div>
                            ))}
                        </div>
                    </main>
                    <button style={styles.fab} onClick={() => setShowForm(true)}><Plus color="white" /></button>
                    {showForm && (
                        <div style={styles.modalBackdrop}>
                            <div style={styles.modal}>
                                <h3>Add a piece</h3>
                                <input style={styles.textInput} placeholder="Name" onChange={e => setForm({...form, name: e.target.value})} />
                                <button style={styles.modalSave} onClick={() => {setItems([form, ...items]); setShowForm(false);}}>Add</button>
                                <button onClick={() => setShowForm(false)}>Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // 5. STYLES & BRANDING (Using your sumi-ink and ivory)
        function FontLoader() {
            return (
                <style>{`
                    :root {
                        --indigo: #16324A;
                        --ivory: #F7F2E7;
                        --sumi-ink: #2B2b2b;
                        --gold: #B8935A;
                    }
                `}</style>
            );
        }

        const styles = {
            app: { fontFamily: "sans-serif", background: "var(--ivory)", color: "var(--sumi-ink)", maxWidth: 480, margin: "0 auto", minHeight: "100vh" },
            header: { padding: 16, background: "var(--indigo)", color: "white", display: "flex", alignItems: "center", gap: 10 },
            headerMark: { border: "1px solid var(--gold)", borderRadius: "50%", width: 30, height: 30, display: "flex", alignItems: "center", justifyContent: "center" },
            headerTitle: { fontWeight: "bold" },
            tabBar: { display: "flex", borderBottom: "1px solid #ddd" },
            tabButton: { flex: 1, padding: 12, border: "none", background: "none" },
            main: { padding: 16 },
            grid: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 },
            card: { background: "white", borderRadius: 4, overflow: "hidden", border: "1px solid #ddd" },
            cardSwatch: { height: 80 },
            cardBody: { padding: 8, fontSize: 13 },
            chipRow: { display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" },
            chip: { padding: "4px 10px", borderRadius: 12, border: "1px solid #ccc", fontSize: 12 },
            fab: { position: "fixed", bottom: 20, right: 20, width: 48, height: 48, borderRadius: "50%", background: "var(--indigo)", border: "none" },
            modalBackdrop: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center" },
            modal: { background: "white", padding: 20, borderRadius: 8, width: "80%" },
            textInput: { width: "100%", padding: 8, margin: "10px 0" },
            modalSave: { background: "var(--indigo)", color: "white", padding: 10, width: "100%", border: "none" }
        };

        // 6. THE TRIGGER (Renders the app)
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KimonoCloset />);
    </script>
</body>
</html>
