<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Tansu - Beta</title>
    <!-- Load the React and Lucide engines -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="margin: 0; background-color: #F7F2E7;">
    <div id="root"></div>

    <script type="text/babel">
        // 1. Setup the environment (replaces the "import" lines)
        const { useState, useEffect, useCallback } = React;
        const { Plus, X, Trash2, Layers, Grid3x3, Check, ImageOff } = lucide;

        // 2. Define the Tansu parameters
        const CATEGORIES = [
            { id: "kimono", label: "Kimono", jp: "着物" },
            { id: "obi", label: "Obi", jp: "帯" },
            { id: "obiage", label: "Obiage", jp: "帯揚げ" },
            { id: "obijime", label: "Obijime", jp: "帯締め" },
            { id: "haneri", label: "Han-eri", jp: "半襟" },
            { id: "accessories", label: "Accessories", jp: "小物" },
        ];

        const SEASONS = [
            { id: "awase", label: "Awase", jp: "袷" },
            { id: "hitoe", label: "Hitoe", jp: "単衣" },
            { id: "usumono", label: "Usumono", jp: "薄物" },
            { id: "yukata", label: "yukata", jp: "浴衣" },
        ];

        const uid = () => Math.random().toString(36).slice(2, 10);
        const emptyForm = { category: "kimono", name: "", season: "awase", color: "#4a5a7a", imageUrl: "", notes: "" };

        // 3. The Main App Component
        function KimonoCloset() {
            const [ready, setReady] = useState(false);
            const [items, setItems] = useState([]);
            const [tab, setTab] = useState("closet");
            const [filter, setFilter] = useState("all");
            const [showForm, setShowForm] = useState(false);
            const [form, setForm] = useState(emptyForm);

            // Use standard browser storage (localStorage) instead of window.storage
            useEffect(() => {
                const saved = localStorage.getItem("tansu-closet");
                if (saved) setItems(JSON.parse(saved));
                setReady(true);
            }, []);

            const saveItems = (newItems) => {
                setItems(newItems);
                localStorage.setItem("tansu-closet", JSON.stringify(newItems));
            };

            if (!ready) return <div style={{padding: 40, textAlign: 'center', color: '#6B6255'}}>Preparing closet...</div>;

            return (
                <div style={styles.app}>
                    <style>{`
                        :root {
                            --indigo: #16324A;
                            --ivory: #F7F2E7;
                            --sumi-ink: #2B2b2b;
                            --gold: #B8935A;
                        }
                        body { background: var(--ivory); }
                    `}</style>
                    <header style={styles.header}>
                        <div style={styles.headerMark}>衣</div>
                        <div style={{color: 'white'}}>
                            <div style={{fontWeight: 'bold'}}>Kimono Closet</div>
                            <div style={{fontSize: '10px', opacity: 0.8}}>Florida Kimono Delegation</div>
                        </div>
                    </header>
                    <main style={{padding: 20}}>
                        <div style={styles.chipRow}>
                            <button onClick={() => setFilter("all")} style={styles.chip}>All</button>
                            {CATEGORIES.map(c => (
                                <button key={c.id} onClick={() => setFilter(c.id)} style={styles.chip}>{c.label}</button>
                            ))}
                        </div>
                        <div style={styles.grid}>
                            {items.filter(i => filter === "all" || i.category === filter).map(item => (
                                <div key={item.id} style={styles.card}>
                                    <div style={{height: 80, background: item.color}} />
                                    <div style={{padding: 8, fontSize: 13}}>{item.name}</div>
                                </div>
                            ))}
                        </div>
                    </main>
                    <button style={styles.fab} onClick={() => setShowForm(true)}><Plus color="white" /></button>
                    {showForm && (
                        <div style={styles.modalBackdrop}>
                            <div style={styles.modal}>
                                <h3 style={{fontFamily: 'serif'}}>Add a piece</h3>
                                <input style={styles.textInput} placeholder="Piece Name" onChange={e => setForm({...form, name: e.target.value})} />
                                <button style={styles.modalSave} onClick={() => {saveItems([form, ...items]); setShowForm(false);}}>Add to Closet</button>
                                <button style={{width: '100%', padding: 10, background: 'none', border: 'none'}} onClick={() => setShowForm(false)}>Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const styles = {
            app: { fontFamily: "sans-serif", background: "white", maxWidth: 480, margin: "0 auto", minHeight: "100vh", boxShadow: "0 0 20px rgba(0,0,0,0.1)" },
            header: { padding: 20, background: "var(--indigo)", display: "flex", alignItems: "center", gap: 12 },
            headerMark: { border: "1px solid var(--gold)", color: "var(--gold)", width: 32, height: 32, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: "bold" },
            chipRow: { display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" },
            chip: { padding: "6px 12px", borderRadius: 20, border: "1px solid #ddd", background: "white", fontSize: 12 },
            grid: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 15 },
            card: { border: "1px solid #eee", borderRadius: 4, overflow: "hidden" },
            fab: { position: "fixed", bottom: 30, right: 30, width: 56, height: 56, borderRadius: "50%", background: "var(--indigo)", border: "none", cursor: "pointer", boxShadow: "0 4px 10px rgba(0,0,0,0.3)" },
            modalBackdrop: { position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 },
            modal: { background: "white", padding: 25, borderRadius: 12, width: "85%", maxWidth: 350 },
            textInput: { width: "100%", padding: 12, margin: "15px 0", boxSizing: "border-box", border: "1px solid #ccc", borderRadius: 4 },
            modalSave: { width: "100%", padding: 12, background: "var(--indigo)", color: "white", border: "none", borderRadius: 4, fontWeight: "bold" }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KimonoCloset />);
    </script>
</body>
</html>
